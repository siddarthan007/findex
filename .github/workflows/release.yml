name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  FINDEX_UPDATER_REPOSITORY: ${{ github.repository }}
  FINDEX_UPDATER_PUBLIC_KEY: ${{ secrets.FINDEX_UPDATER_PUBLIC_KEY }}
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  release-guard:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Require updater signing configuration
        shell: bash
        run: |
          test -n "$FINDEX_UPDATER_PUBLIC_KEY"
          test -n "$TAURI_SIGNING_PRIVATE_KEY"
          test -n "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
      - name: Require tag and package versions to agree
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          grep -q "^version = \"$version\"" crates/findex-core/Cargo.toml
          grep -q "^version = \"$version\"" crates/findex-cli/Cargo.toml
          grep -q "^version = \"$version\"" crates/findex-tauri/Cargo.toml

  cli:
    needs: release-guard
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: findex-cli-windows-x86_64
            archive: findex-windows-x86_64.zip
            binary: target/release/findex-cli.exe
            packaged_binary: findex.exe
          - os: ubuntu-24.04
            artifact: findex-cli-linux-x86_64
            archive: findex-linux-x86_64.zip
            binary: target/release/findex-cli
            packaged_binary: findex
          - os: macos-15
            artifact: findex-cli-macos-aarch64
            archive: findex-macos-aarch64.zip
            binary: target/release/findex-cli
            packaged_binary: findex
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crates/findex-tauri/package-lock.json
      - uses: Swatinem/rust-cache@v2
      - working-directory: crates/findex-tauri
        run: npm ci
      - run: cargo test --locked -p findex-core -p findex-cli
      - run: cargo build --release --locked -p findex-cli
      - name: Package Windows CLI
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/package | Out-Null
          Copy-Item -LiteralPath '${{ matrix.binary }}' -Destination 'dist/package/${{ matrix.packaged_binary }}'
          Compress-Archive -LiteralPath 'dist/package/${{ matrix.packaged_binary }}' -DestinationPath 'dist/${{ matrix.archive }}' -CompressionLevel Optimal
      - name: Package Linux CLI
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist/package
          cp '${{ matrix.binary }}' 'dist/package/${{ matrix.packaged_binary }}'
          chmod 755 'dist/package/${{ matrix.packaged_binary }}'
          (cd dist/package && zip -9 "../${{ matrix.archive }}" '${{ matrix.packaged_binary }}')
      - name: Sign CLI archive
        working-directory: crates/findex-tauri
        run: npm run tauri:sign -- ../../dist/${{ matrix.archive }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.archive }}
            dist/${{ matrix.archive }}.sig
          if-no-files-found: error

  cli-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [cli, desktop]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: findex-cli-*
          path: dist
          merge-multiple: true
      - name: Build CLI update manifest
        shell: pwsh
        run: ./scripts/build_cli_manifest.ps1 -Version '${{ github.ref_name }}' -Repository '${{ github.repository }}' -ArtifactsDir dist -Output dist/latest-cli.json
      - uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.sig
            dist/latest-cli.json

  desktop:
    needs: release-guard
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-24.04, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crates/findex-tauri/package-lock.json
      - uses: Swatinem/rust-cache@v2
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - working-directory: crates/findex-tauri
        run: npm ci
      - name: Build desktop bundles
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v1
        with:
          projectPath: crates/findex-tauri
          args: --config tauri.updater.conf.json
      - name: Build and attach tagged desktop release
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/findex-tauri
          args: --config tauri.updater.conf.json
          tagName: ${{ github.ref_name }}
          releaseName: Findex ${{ github.ref_name }}
          releaseDraft: true
      - uses: actions/upload-artifact@v7
        with:
          name: findex-desktop-${{ runner.os }}
          path: target/release/bundle/**/*
          if-no-files-found: error

  release-checksums:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [cli-release, desktop]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: findex-*
          path: dist
      - name: Build release checksum catalogue
        shell: bash
        run: |
          mkdir release-assets
          find dist -type f \( -name '*.exe' -o -name '*.msi' -o -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' -o -name '*.dmg' -o -name '*.zip' -o -name '*.sig' -o -name '*.tar.gz' \) -print0 |
            while IFS= read -r -d '' file; do cp "$file" "release-assets/$(basename "$file")"; done
          test -n "$(find release-assets -type f -print -quit)"
          (cd release-assets && sha256sum * | sort -k2) > SHA256SUMS
      - uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: SHA256SUMS
